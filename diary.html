<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой дневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Georgia', serif;
            color: #d4b0ff;
            z-index: 1;
            padding: 20px;
        }

        /* ============================================================
           ФОН (КАРТИНКА + ЗАТЕМНЕНИЕ)
           ============================================================ */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(20, 0, 30, 0.85), rgba(5, 0, 10, 0.92)),
                url('images/bg.png') center/cover no-repeat;
            z-index: -1;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #6a1bb0, #d4b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 1;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.6;
            font-size: 1.1em;
            margin-bottom: 40px;
            z-index: 1;
        }

        /* ============================================================
           КНОПКИ-КАРТОЧКИ
           ============================================================ */
        .menu-grid {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
            max-width: 900px;
        }

        .menu-card {
            background: rgba(10, 5, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(160, 80, 255, 0.2);
            border-radius: 20px;
            padding: 40px 35px;
            width: 220px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #d4b0ff;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            border-color: rgba(160, 80, 255, 0.5);
            box-shadow: 0 0 40px rgba(160, 80, 255, 0.15);
            background: rgba(10, 5, 20, 0.8);
        }

        .menu-card .icon {
            font-size: 3em;
            display: block;
            margin-bottom: 15px;
        }

        .menu-card .title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 8px;
            font-family: 'GWENT', 'Comic Sans', sans-serif;
            letter-spacing: 1px;
        }

        .menu-card .desc {
            font-size: 0.8em;
            opacity: 0.5;
        }

        /* Кнопка "Галерея" — активная (светится) */
        .menu-card.active {
            border-color: rgba(160, 80, 255, 0.6);
            box-shadow: 0 0 50px rgba(160, 80, 255, 0.2);
        }

        /* Кнопка "Дневник" и "Ежедневник" — неактивные (приглушённые) */
        .menu-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .menu-card.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        /* ============================================================
           АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ
           ============================================================ */
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            .menu-grid {
                gap: 15px;
                flex-direction: column;
                align-items: center;
            }
            .menu-card {
                width: 100%;
                max-width: 280px;
                padding: 25px 20px;
            }
            .menu-card .icon {
                font-size: 2.2em;
            }
        }

        /* ============================================================
           КНОПКА ВЫХОДА
           ============================================================ */
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 50, 50, 0.15);
            border: 1px solid rgba(255, 50, 50, 0.2);
            border-radius: 12px;
            color: #ff6b6b;
            padding: 10px 20px;
            font-family: 'Comic Sans', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: rgba(255, 50, 50, 0.25);
            border-color: rgba(255, 50, 50, 0.4);
        }
    </style>
</head>
<body>
    <!-- КНОПКА ВЫХОДА -->
    <a href="index.html" class="logout-btn">🚪 Выйти</a>

    <h1>📖 Мой дневник</h1>
    <p class="subtitle">Добро пожаловать! Выбери раздел:</p>

    <div class="menu-grid">
        <!-- ДНЕВНИК (неактивен) -->
        <div class="menu-card disabled">
            <span class="icon">📓</span>
            <div class="title">Дневник</div>
            <div class="desc">Личные размышления</div>
            <div style="margin-top: 12px; font-size: 0.7em; opacity: 0.3;">🚧 В разработке</div>
        </div>

        <!-- ЕЖЕДНЕВНИК (неактивен) -->
        <div class="menu-card disabled">
            <span class="icon">📋</span>
            <div class="title">Ежедневник</div>
            <div class="desc">Планы и задачи</div>
            <div style="margin-top: 12px; font-size: 0.7em; opacity: 0.3;">🚧 В разработке</div>
        </div>

        <!-- ГАЛЕРЕЯ (активна) -->
        <a href="gallery.html" class="menu-card active">
            <span class="icon">🖼️</span>
            <div class="title">Галерея</div>
            <div class="desc">Картинки, карты и файлы</div>
            <div style="margin-top: 12px; font-size: 0.7em; opacity: 0.6;">✨ Перейти</div>
        </a>
    </div>

    <script>
        // Просто чтобы показать, что кнопки "Дневник" и "Ежедневник" пока не работают
        console.log('🔒 Дневник и Ежедневник пока в разработке');
        console.log('🖼️ Галерея активна!');
    </script>
</body>
</html>
