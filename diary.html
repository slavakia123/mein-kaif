<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой дневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Georgia', serif;
            color: #d4b0ff;
            z-index: 1;
        }

        /* ============================================================
           ФОН (КАРТИНКА + ЗАТЕМНЕНИЕ)
           ============================================================ */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(20, 0, 30, 0.85), rgba(5, 0, 10, 0.92)),
                url('images/bg.png') center/cover no-repeat;
            z-index: -1;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #6a1bb0, #d4b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 1;
        }

        p {
            opacity: 0.6;
            font-size: 1.2em;
            z-index: 1;
        }

        /* Тень для читаемости текста */
        h1, p {
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <h1>📖 Мой дневник</h1>
    <p>Добро пожаловать! Здесь будут твои записи.</p>
    <p style="font-size: 0.8em; opacity: 0.3;">Скоро здесь появится контент</p>
</body>
</html>
