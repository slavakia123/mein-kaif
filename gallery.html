<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            position: relative;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            color: #d4b0ff;
            z-index: 1;
            padding: 20px;
            background: #0a0a0f;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(20, 0, 30, 0.92), rgba(5, 0, 10, 0.95)),
                url('images/bg.png') center/cover no-repeat;
            z-index: -1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(45deg, #6a1bb0, #d4b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid rgba(160, 80, 255, 0.3);
            border-radius: 12px;
            background: rgba(10, 5, 20, 0.6);
            backdrop-filter: blur(10px);
            color: #d4b0ff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans', sans-serif;
            font-size: 0.9em;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: rgba(160, 80, 255, 0.15);
            border-color: rgba(160, 80, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6a1bb0, #3a0a6a);
            border-color: rgba(160, 80, 255, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #7a2bc0, #4a1a7a);
        }

        .btn-danger {
            border-color: rgba(255, 50, 50, 0.3);
            color: #ff6b6b;
        }

        .btn-danger:hover {
            background: rgba(255, 50, 50, 0.15);
            border-color: rgba(255, 50, 50, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(160, 80, 255, 0.2);
            background: rgba(10, 5, 20, 0.4);
            color: rgba(180, 140, 220, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans', sans-serif;
            font-size: 0.8em;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(160, 80, 255, 0.15);
            border-color: rgba(160, 80, 255, 0.5);
            color: #d4b0ff;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .gallery-item {
            position: relative;
            background: rgba(10, 5, 20, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(160, 80, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            border-color: rgba(160, 80, 255, 0.4);
            box-shadow: 0 0 30px rgba(160, 80, 255, 0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .file-icon {
            font-size: 4em;
            opacity: 0.6;
        }

        .gallery-item .file-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.7);
            font-size: 0.7em;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gallery-item .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 50, 50, 0.7);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            color: white;
            font-size: 0.8em;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item:hover .delete-btn {
            opacity: 1;
        }

        .gallery-item .delete-btn:hover {
            background: rgba(255, 50, 50, 1);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            opacity: 0.5;
        }

        .empty-state .icon {
            font-size: 4em;
            display: block;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(160, 80, 255, 0.2);
            background: #0a0a0f;
            padding: 20px;
            position: relative;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
        }

        .modal-content .file-view {
            max-width: 100%;
            max-height: 80vh;
            padding: 40px;
            background: rgba(10, 5, 20, 0.8);
            border-radius: 8px;
            color: #d4b0ff;
            text-align: center;
        }

        .modal-content .file-view .icon {
            font-size: 5em;
            display: block;
            margin-bottom: 20px;
        }

        .modal-close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 50, 50, 0.6);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(10, 5, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(160, 80, 255, 0.3);
            color: #d4b0ff;
            font-family: 'Comic Sans', sans-serif;
            font-size: 0.9em;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            border-color: rgba(100, 255, 100, 0.3);
        }

        .toast.error {
            border-color: rgba(255, 100, 100, 0.3);
        }

        .progress-container {
            display: none;
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
            background: rgba(10, 5, 20, 0.6);
            border-radius: 20px;
            overflow: hidden;
            height: 8px;
            border: 1px solid rgba(160, 80, 255, 0.2);
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6a1bb0, #d4b0ff);
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .progress-text {
            text-align: center;
            font-size: 0.8em;
            opacity: 0.6;
            margin-top: 5px;
            font-family: 'Comic Sans', sans-serif;
            display: none;
        }

        .progress-text.active {
            display: block;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header h1 {
                font-size: 1.5em;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖼️ Галерея</h1>
        <div class="header-actions">
            <button class="btn btn-primary" id="uploadBtn">📤 Загрузить файлы</button>
            <button class="btn" id="syncBtn">🔄 Синхронизировать</button>
            <a href="diary.html" class="btn">⬅ Назад</a>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="image">🖼️ Изображения</button>
        <button class="filter-btn" data-filter="file">📄 Файлы</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-text" id="progressText">Загрузка...</div>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <input type="file" id="fileInput" style="display:none" multiple accept="*/*">

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // 1. НАСТРОЙКИ
        // ============================================================
        // ⚠️ ЗАМЕНИТЕ 'ВАШ_ТОКЕН' НА ВАШ ТОКЕН ИЗ GITHUB ⚠️
        const GITHUB_TOKEN = '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'; // <-- ВСТАВЬТЕ СЮДА ВАШ ТОКЕН
        const REPO_OWNER = 'slavakia123';
        const REPO_NAME = 'mein-kaif';
        const UPLOAD_FOLDER = 'uploads/';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${UPLOAD_FOLDER}`;

        let files = [];
        let currentFilter = 'all';
        let isUploading = false;

        // ============================================================
        // 2. ТОСТ-СООБЩЕНИЯ
        // ============================================================
        let toastTimeout = null;

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================================
        // 3. ПРОГРЕСС-БАР
        // ============================================================
        function showProgress(show) {
            const container = document.getElementById('progressContainer');
            const text = document.getElementById('progressText');
            if (show) {
                container.classList.add('active');
                text.classList.add('active');
            } else {
                container.classList.remove('active');
                text.classList.remove('active');
                document.getElementById('progressBar').style.width = '0%';
            }
        }

        function updateProgress(percent, text) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = text;
        }

        // ============================================================
        // 4. ЗАГРУЗКА ФАЙЛОВ НА GITHUB
        // ============================================================
        async function uploadFileToGitHub(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const base64Content = e.target.result.split(',')[1];
                        const path = UPLOAD_FOLDER + file.name;
                        
                        let sha = null;
                        try {
                            const checkResponse = await fetch(
                                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
                                {
                                    headers: {
                                        'Authorization': `token ${GITHUB_TOKEN}`,
                                        'Accept': 'application/vnd.github.v3+json'
                                    }
                                }
                            );
                            if (checkResponse.ok) {
                                const data = await checkResponse.json();
                                sha = data.sha;
                            }
                        } catch (e) {}

                        const payload = {
                            message: `Добавлен файл: ${file.name}`,
                            content: base64Content,
                            branch: 'main'
                        };
                        if (sha) {
                            payload.sha = sha;
                            payload.message = `Обновлён файл: ${file.name}`;
                        }

                        const response = await fetch(
                            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
                            {
                                method: 'PUT',
                                headers: {
                                    'Authorization': `token ${GITHUB_TOKEN}`,
                                    'Content-Type': 'application/json',
                                    'Accept': 'application/vnd.github.v3+json'
                                },
                                body: JSON.stringify(payload)
                            }
                        );

                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.message || 'Ошибка загрузки');
                        }

                        const result = await response.json();
                        resolve(result);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = function(err) {
                    reject(err);
                };
                reader.readAsDataURL(file);
            });
        }

        // ============================================================
        // 5. ЗАГРУЗКА НЕСКОЛЬКИХ ФАЙЛОВ С ПРОГРЕССОМ
        // ============================================================
        async function uploadMultipleFiles(fileList) {
            if (isUploading) {
                showToast('⏳ Уже идёт загрузка', 'error');
                return;
            }

            if (!GITHUB_TOKEN || GITHUB_TOKEN === 'ВАШ_ТОКЕН') {
                showToast('❌ Сначала настройте GitHub токен в коде', 'error');
                return;
            }

            isUploading = true;
            document.getElementById('uploadBtn').disabled = true;
            showProgress(true);

            let successCount = 0;
            let errorCount = 0;
            const total = fileList.length;

            for (let i = 0; i < fileList.length; i++) {
                const file = fileList[i];
                const percent = Math.round(((i) / total) * 100);
                updateProgress(percent, `Загрузка ${i+1}/${total}: ${file.name}`);

                try {
                    await uploadFileToGitHub(file);
                    successCount++;
                    console.log(`✅ Загружен: ${file.name}`);
                } catch (err) {
                    console.error(`❌ Ошибка загрузки ${file.name}:`, err);
                    errorCount++;
                    showToast(`⚠️ Ошибка: ${file.name}`, 'error');
                }
            }

            updateProgress(100, `Готово! Загружено ${successCount} из ${total}`);
            
            setTimeout(() => {
                showProgress(false);
                document.getElementById('uploadBtn').disabled = false;
                isUploading = false;
                loadFilesFromGitHub();
            }, 1000);

            if (successCount > 0) {
                showToast(`✅ Загружено ${successCount} файлов`, 'success');
            }
            if (errorCount > 0) {
                showToast(`⚠️ ${errorCount} файлов не загружено`, 'error');
            }
        }

        // ============================================================
        // 6. ЗАГРУЗКА СПИСКА ФАЙЛОВ С GITHUB
        // ============================================================
        async function loadFilesFromGitHub() {
            try {
                showToast('🔄 Загрузка файлов...', '');
                
                const response = await fetch(API_URL, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        files = [];
                        renderGallery();
                        showToast('📭 Нет файлов', '');
                        return;
                    }
                    throw new Error('Ошибка загрузки списка');
                }

                const data = await response.json();
                
                const fileItems = data.filter(item => item.type === 'file');
                
                const filePromises = fileItems.map(async (item) => {
                    try {
                        const fileResponse = await fetch(item.download_url);
                        const blob = await fileResponse.blob();
                        const isImage = blob.type.startsWith('image/');
                        const dataUrl = await blobToDataURL(blob);
                        
                        return {
                            id: item.sha,
                            name: item.name,
                            path: item.path,
                            type: blob.type,
                            size: blob.size,
                            data: dataUrl,
                            isImage: isImage,
                            date: item.commit?.committer?.date || new Date().toISOString(),
                            sha: item.sha,
                            download_url: item.download_url
                        };
                    } catch (err) {
                        console.error(`Ошибка загрузки ${item.name}:`, err);
                        return null;
                    }
                });

                const results = await Promise.all(filePromises);
                files = results.filter(f => f !== null);
                
                renderGallery();
                showToast(`📊 Загружено ${files.length} файлов`, 'success');
                console.log(`📊 Всего файлов в облаке: ${files.length}`);
                
            } catch (err) {
                console.error('Ошибка загрузки с GitHub:', err);
                showToast('❌ Ошибка загрузки файлов', 'error');
                files = [];
                renderGallery();
            }
        }

        function blobToDataURL(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    resolve(e.target.result);
                };
                reader.onerror = function(e) {
                    reject(e.target.error);
                };
                reader.readAsDataURL(blob);
            });
        }

        // ============================================================
        // 7. УДАЛЕНИЕ ФАЙЛА С GITHUB
        // ============================================================
        async function deleteFileFromGitHub(path, sha) {
            const response = await fetch(
                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
                {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Удалён файл: ${path.split('/').pop()}`,
                        sha: sha,
                        branch: 'main'
                    })
                }
            );

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'Ошибка удаления');
            }

            return await response.json();
        }

        // ============================================================
        // 8. ОТОБРАЖЕНИЕ ГАЛЕРЕИ
        // ============================================================
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            
            let filteredFiles = files;
            if (currentFilter === 'image') {
                filteredFiles = files.filter(f => f.isImage);
            } else if (currentFilter === 'file') {
                filteredFiles = files.filter(f => !f.isImage);
            }

            if (filteredFiles.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        <p>Пока нет файлов</p>
                        <p style="font-size:0.8em;opacity:0.5;">Нажми "Загрузить файлы", чтобы добавить</p>
                        <p style="font-size:0.7em;opacity:0.3;margin-top:10px;">Поддерживаются любые файлы</p>
                        <p style="font-size:0.7em;opacity:0.3;">Данные хранятся в облаке (GitHub)</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredFiles.map(file => `
                <div class="gallery-item" data-id="${file.id}" data-isimage="${file.isImage}">
                    ${file.isImage 
                        ? `<img src="${file.data}" alt="${file.name}" loading="lazy">` 
                        : `<div class="file-icon">📄</div>`
                    }
                    <div class="file-name">${file.name}</div>
                    <button class="delete-btn" onclick="deleteFile('${file.id}')">✕</button>
                </div>
            `).join('');

            document.querySelectorAll('.gallery-item').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.classList.contains('delete-btn')) return;
                    const id = this.dataset.id;
                    const file = files.find(f => f.id === id);
                    if (file) openModal(file);
                });
            });
        }

        // ============================================================
        // 9. УДАЛЕНИЕ ФАЙЛА (С ОБЛАКА)
        // ============================================================
        async function deleteFile(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;
            
            if (confirm(`Удалить файл "${file.name}" из облака?`)) {
                try {
                    showToast(`🗑️ Удаление ${file.name}...`, '');
                    await deleteFileFromGitHub(file.path, file.sha);
                    showToast(`✅ Удалён: ${file.name}`, 'success');
                    await loadFilesFromGitHub();
                } catch (err) {
                    console.error('Ошибка удаления:', err);
                    showToast(`❌ Ошибка удаления: ${err.message}`, 'error');
                }
            }
        }

        // ============================================================
        // 10. МОДАЛЬНОЕ ОКНО
        // ============================================================
        function openModal(file) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modalBody');
            
            if (file.isImage) {
                body.innerHTML = `<img src="${file.data}" alt="${file.name}">`;
            } else {
                body.innerHTML = `
                    <div class="file-view">
                        <span class="icon">📄</span>
                        <p style="font-size:1.2em;margin-bottom:10px;">${file.name}</p>
                        <p style="opacity:0.5;font-size:0.8em;">Размер: ${(file.size / 1024).toFixed(1)} КБ</p>
                        <p style="opacity:0.3;font-size:0.7em;margin-top:10px;">Тип: ${file.type || 'неизвестен'}</p>
                        <a href="${file.download_url || file.data}" download="${file.name}" class="btn btn-primary" style="margin-top:20px;">
                            ⬇ Скачать
                        </a>
                    </div>
                `;
            }
            
            modal.classList.add('active');
        }

        document.getElementById('modalClose').addEventListener('click', function() {
            document.getElementById('modal').classList.remove('active');
        });

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });

        // ============================================================
        // 11. ФИЛЬТРЫ
        // ============================================================
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderGallery();
            });
        });

        // ============================================================
        // 12. ЗАГРУЗКА ФАЙЛОВ (НЕСКОЛЬКО)
        // ============================================================
        document.getElementById('uploadBtn').addEventListener('click', function() {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (this.files.length > 0) {
                const fileArray = Array.from(this.files);
                uploadMultipleFiles(fileArray);
                this.value = '';
            }
        });

        // ============================================================
        // 13. СИНХРОНИЗАЦИЯ
        // ============================================================
        document.getElementById('syncBtn').addEventListener('click', function() {
            loadFilesFromGitHub();
        });

        // ============================================================
        // 14. ЗАПУСК
        // ============================================================
        async function init() {
            if (!GITHUB_TOKEN || GITHUB_TOKEN === 'ВАШ_ТОКЕН') {
                showToast('⚠️ Вставьте ваш GitHub токен в код', 'error');
                console.warn('⚠️ Токен GitHub не настроен!');
            }
            
            await loadFilesFromGitHub();
            console.log('🖼️ Облачная галерея загружена!');
        }

        init();
    </script>
</body>
</html>
